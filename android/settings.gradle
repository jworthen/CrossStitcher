pluginManagement {
  def projectRoot = rootDir.parentFile

  def reactNativeGradlePlugin = file(
    providers.exec {
      workingDir(projectRoot)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = file(
    providers.exec {
      workingDir(projectRoot)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).parentFile.absolutePath + "/android/expo-gradle-plugin"
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

// Fix: @react-native-async-storage/async-storage 2.x declares
//   configurations { compileClasspath }
// BEFORE applying 'com.android.library'. Gradle selects this legacy configuration
// (canBeConsumed=true) as an artifact source for :app's compile classpath. Its
// artifact-transform providers are never initialised, causing:
//   "Cannot query the value of this provider because it has no value available"
//   at LocalFileDependencyBackedArtifactSet.visitDependencies
//
// Fix: directly patch the file using Groovy/Java I/O — no external process needed,
// so it works reliably even when 'node' is not in the Gradle daemon's PATH on Windows.
// settings.gradle is processed before any project's build.gradle, so the patch is
// applied before Gradle ever reads async-storage's build script.
try {
  def buildGradle = new File(
    rootDir.parentFile,
    'node_modules/@react-native-async-storage/async-storage/android/build.gradle'
  )
  if (buildGradle.exists()) {
    def original = buildGradle.text
    // Match the block whether the file uses LF or CRLF line endings.
    def patched = original.replaceFirst(
      /(?m)^configurations\s*\{[^}]*compileClasspath[^}]*\}\s*\r?\n/,
      '// configurations { compileClasspath } removed by settings.gradle\n' +
      '// Pre-declaring this before AGP breaks Gradle artifact-transform providers.\n\n'
    )
    if (patched != original) {
      buildGradle.text = patched
      logger.lifecycle('[async-storage-patch] Patched async-storage/android/build.gradle')
    }
  }
} catch (Exception e) {
  logger.warn('[async-storage-patch] {}', e.message)
}

// Belt-and-suspenders: also intercept any compileClasspath configurations created
// with canBeConsumed=true before AGP resets them to the correct role.
gradle.addProjectEvaluationListener(new ProjectEvaluationListener() {
  void beforeEvaluate(Project p) {
    p.configurations.whenObjectAdded { config ->
      if (config.name == 'compileClasspath' && config.canBeConsumed) {
        config.canBeConsumed = false
      }
    }
  }
  void afterEvaluate(Project p, ProjectState s) {}
})

// Disable configure-on-demand: Expo CLI always passes --configure-on-demand;
// this overrides it so every project is configured eagerly.
gradle.startParameter.configureOnDemand = false

expoAutolinking.projectRoot = rootDir.parentFile

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand()
}
expoAutolinking.useExpoModules()

rootProject.name = 'CrossStitcher'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
