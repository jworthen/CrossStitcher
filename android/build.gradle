// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url='https://www.jitpack.io' }
    // Local Maven repo bundled with @react-native-async-storage/async-storage v3.x,
    // which ships storage-android AAR inside the npm package instead of publishing to
    // a public registry.
    //
    // Use File(parent, child).toURI() for cross-platform path safety (Windows backslash),
    // and mavenPom()+artifact() so Gradle uses only the POM and skips the .module file
    // whose "component" URL points to a sibling storage:1.0.0 module that does not exist
    // in this local repo -- Gradle following that missing URL creates an unresolved provider
    // that throws MissingValueException at task-graph time.
    maven {
      url = new File(rootDir.parentFile, 'node_modules/@react-native-async-storage/async-storage/android/local_repo').toURI()
      metadataSources {
        mavenPom()
        artifact()
      }
    }
    // Expo bundled module local-maven-repos.
    // expo-modules-autolinking registers these via repositories.mavenLocal { url = ... }
    // which in Gradle 9.0.0 does not properly override the URL (defaults to ~/.m2/repository).
    // Registering them here as standard maven { url = ... } repos bypasses that bug.
    maven { url = new File(rootDir.parentFile, 'node_modules/expo-keep-awake/local-maven-repo').toURI() }
    maven { url = new File(rootDir.parentFile, 'node_modules/expo-font/local-maven-repo').toURI() }
    maven { url = new File(rootDir.parentFile, 'node_modules/expo-asset/local-maven-repo').toURI() }
    maven { url = new File(rootDir.parentFile, 'node_modules/expo-file-system/local-maven-repo').toURI() }
    maven { url = new File(rootDir.parentFile, 'node_modules/@expo/dom-webview/local-maven-repo').toURI() }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
